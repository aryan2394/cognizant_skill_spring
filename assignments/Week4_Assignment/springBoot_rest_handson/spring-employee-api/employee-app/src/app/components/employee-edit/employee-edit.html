<div class="max-w-lg mx-auto bg-white rounded-xl shadow-md p-8">

  <div class="flex items-center gap-3 mb-6">
    <button (click)="onCancel()"
            class="text-indigo-600 hover:text-indigo-800 transition">
      ← Back
    </button>
    <h2 class="text-2xl font-bold text-indigo-800">Edit Employee</h2>
  </div>

  @if (isLoading) {
    <div class="flex items-center gap-2 text-gray-500 italic">
      <svg class="animate-spin h-5 w-5 text-indigo-600"
           xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10"
                stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
      </svg>
      Loading employee data...
    </div>
  }

  @if (errorMessage) {
    <div class="bg-red-100 border border-red-300 text-red-700 px-4 py-3 rounded mb-4">
      ⚠️ {{ errorMessage }}
    </div>
  }

  @if (successMessage) {
    <div class="bg-green-100 border border-green-300 text-green-700 px-4 py-3 rounded mb-4">
      ✅ {{ successMessage }}
    </div>
  }

  @if (!isLoading && !errorMessage) {
    <form (ngSubmit)="onSave()" class="space-y-4">

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Employee ID</label>
        <input type="text" [value]="employee.id" disabled
               class="w-full px-3 py-2 border border-gray-200 rounded-lg
                      bg-gray-100 text-gray-400 cursor-not-allowed"/>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Full Name</label>
        <input type="text" [(ngModel)]="employee.name" name="name" required
               placeholder="Enter full name"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg
                      focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"/>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Designation</label>
        <input type="text" [(ngModel)]="employee.designation" name="designation" required
               placeholder="Enter designation"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg
                      focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"/>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Department</label>
        <input type="text" [(ngModel)]="employee.department" name="department" required
               placeholder="Enter department"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg
                      focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"/>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Email Address</label>
        <input type="email" [(ngModel)]="employee.email" name="email" required
               placeholder="Enter email"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg
                      focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"/>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Phone Number</label>
        <input type="text" [(ngModel)]="employee.phone" name="phone" required
               placeholder="Enter phone number"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg
                      focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"/>
      </div>

      <div class="flex gap-4 pt-4">
        <button type="submit"
                class="flex-1 bg-green-600 hover:bg-green-700 text-white
                       font-semibold py-2 rounded-lg transition duration-150">
          💾 Save Changes
        </button>
        <button type="button" (click)="onCancel()"
                class="flex-1 bg-red-500 hover:bg-red-600 text-white
                       font-semibold py-2 rounded-lg transition duration-150">
          ✖ Cancel
        </button>
      </div>

    </form>
  }
</div>
